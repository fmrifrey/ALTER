dataset:
  name: abide
  batch_size: 16
  test_batch_size: 16
  val_batch_size: 16
  train_set: 0.7
  val_set: 0.1
  path: abide2.npy
  stratified: true
  drop_last: true
model:
  name: BrainNetworkTransformer
  sizes:
  - 360
  - 100
  pooling:
  - false
  - true
  pos_encoding: rrwp
  orthogonal: true
  freeze_center: true
  project_assignment: true
  pos_embed_dim: 32
optimizer:
- name: Adam
  lr: 0.0001
  match_rule: None
  except_rule: None
  no_weight_decay: false
  weight_decay: 0.0001
  lr_scheduler:
    mode: cos
    base_lr: 0.0001
    target_lr: 1.0e-05
    decay_factor: 0.1
    milestones:
    - 0.3
    - 0.6
    - 0.9
    poly_power: 2.0
    lr_decay: 0.98
    warm_up_from: 0.0
    warm_up_steps: 0
training:
  name: Train
  epochs: 200
datasz:
  percentage: 1.0
preprocess:
  name: continus_mixup
  continus: true
repeat_time: 10
log_path: result
save_learnable_graph: false
wandb_entity: eggroup
project: brainnetworktransformer
